<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세 정보 - TVING</title>
    <link rel="stylesheet" href="css.css">
</head>
<body class="detail-page">
    <header class="header">
        <div class="logo"><a href="index.html">TVING</a></div>
        <a href="index.html" class="back-btn">← 돌아가기</a>
    </header>

    <div class="detail-container">
        <div class="detail-hero" style="background-image: linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0.3)), url('https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNTAzMjRfOTAg%2FMDAxNzQyODE3NjM5MTA0.U1j9v9pVSJKVTQu7w0mnQ8VPlOHnD4MjvSEeiskTnawg.coI-fp8fkzfSxZZREvKeQY_AnkSJFaYKbyNI6JvjK0Mg.JPEG%2Foutput_1731633348.jpg&type=a340');">
            <div class="detail-info">
                <span class="badge">티빙 오리지널</span>
                <h1 id="detail-title">헬로키티</h1>
                <p class="meta">2026 • 에피소드 8개 • 3세 이용가</p>
                <p class="synopsis">아주아주 귀여운 헬로키티 티빙 독점 시리즈를 지금 바로 확인하세요.</p>
                
                <div class="action-buttons">
                    <button class="play-btn">▶ 재생하기</button>
                    <button id="like-btn" class="icon-btn">❤️ <span>0</span></button>
                    <button id="share-btn" class="icon-btn">🔗 공유</button>
                </div>
            </div>
        </div>
    </div>


    <script>
        // 간단한 상세페이지 (좋아요)
        const likeBtn = document.getElementById('like-btn');
        let count = 0;
        likeBtn.addEventListener('click', () => { //버튼 누를때 카운트 
            count++;
            likeBtn.querySelector('span').innerText = count;
            likeBtn.classList.toggle('active');
        });

        
document.addEventListener("DOMContentLoaded", () => {
    // 1. 메인 페이지가 서랍에 넣어둔 "클릭한 영화 번호"를 꺼냅니다.
    const selectedId = sessionStorage.getItem("selectedMovie");

    // 2. 메인에 있던 것과 똑같은 영화 데이터 보관함입니다.
    const movieData = [
        { id: 1, title: "리락쿠마", desc: "리락쿠마, 코리락쿠마", img: "https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNTExMjJfMjA2%2FMDAxNzYzODE3MjYzMjk3.whsdMb68A-Re1-0wc3FGK1JKwehuq72Siq3naRR-cH0g.ICT-54mUsjAhYZVmmshRmpE2M-e2xJB7eLZkhVr5a8gg.JPEG%2Foutput_1845484977.jpg&type=a340" },
        { id: 2, title: "먼가 작고 귀여운 녀석들", desc: "치이카와, 하치와레, 우사기", img: "https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyNDEyMTNfMjcy%2FMDAxNzM0MDYwMTk4ODky.dDx1TeRy2_mX1MBiYr4rINQdjd2CqcUChaL_KzNcdgYg.Toa1SH_V5MRnjMXD1PvbQcEMBY2yhNALmj86-LUn8iAg.JPEG%2F%25C4%25A1%25C0%25CC%25C4%25AB%25BF%25CD_%2528245%2529.jpg&type=a340" }
    ];

    // 3. 보관함에서 서랍에서 꺼낸 번호와 똑같은 영화를 찾습니다.
    const currentMovie = movieData.find(movie => movie.id == selectedId);

    // 4. 찾은 영화가 있다면, 화면의 제목과 배경 이미지를 그 영화의 것으로 바꿔치기합니다!
    if (currentMovie) {
        document.getElementById("detail-title").innerText = currentMovie.title;
        document.querySelector(".synopsis").innerText = currentMovie.desc;
        document.querySelector(".detail-hero").style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,1) 30%, rgba(0,0,0,0.3)), url('${currentMovie.img}')`;
    }
});
    </script>
</body>
</html>
